# Define a porta em que o servidor local vai rodar
server.port=8080

# Configura as credenciais e a criação do banco de dados em memória (H2)
spring.datasource.url=jdbc:h2:mem:tarefasdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Atualiza as tabelas do banco automaticamente caso a classe 'Tarefa' mude
spring.jpa.hibernate.ddl-auto=update

# Habilita uma interface no navegador para vermos o banco por dentro
spring.h2.console.enabled=true